<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Shop Demo - MERN E-Commerce</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext, useReducer } = React;
    const { BrowserRouter, Routes, Route, Link, useNavigate } = ReactRouterDOM;

    // Mock data
    const sampleProducts = [
      { _id: '1', name: 'Premium Laptop', price: 1299, image: 'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400', rating: 4.5, numReviews: 12, countInStock: 10 },
      { _id: '2', name: 'Wireless Headphones', price: 199, image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400', rating: 4.8, numReviews: 45, countInStock: 25 },
      { _id: '3', name: 'Smart Watch', price: 299, image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400', rating: 4.2, numReviews: 28, countInStock: 15 }
    ];

    // Cart Context
    const CartContext = createContext();
    
    const CartProvider = ({ children }) => {
      const [cartItems, setCartItems] = useState([]);

      const addToCart = (product) => {
        const existItem = cartItems.find(x => x._id === product._id);
        if (existItem) {
          setCartItems(cartItems.map(x => x._id === existItem._id ? {...existItem, count: existItem.count + 1} : x));
        } else {
          setCartItems([...cartItems, {...product, count: 1}]);
        }
      };

      const removeFromCart = (id) => {
        setCartItems(cartItems.filter(x => x._id !== id));
      };

      return (
        <CartContext.Provider value={{ cartItems, addToCart, removeFromCart }}>
          {children}
        </CartContext.Provider>
      );
    };

    const Navbar = () => {
      const { cartItems } = useContext(CartContext);
      return (
        <nav className="bg-blue-600 p-4 shadow-lg">
          <div className="max-w-4xl mx-auto flex justify-between items-center">
            <Link to="/" className="text-white text-2xl font-bold hover:text-blue-200">E-Shop</Link>
            <div className="flex space-x-6">
              <Link to="/" className="text-white hover:text-blue-200">Home</Link>
              <Link to="/products" className="text-white hover:text-blue-200">Products</Link>
              <Link to="/cart" className="text-white hover:text-blue-200">
                Cart ({cartItems.reduce((a, c) => a + c.count, 0)})
              </Link>
            </div>
          </div>
        </nav>
      );
    };

    const Home = () => (
      <div className="max-w-4xl mx-auto py-12 px-4">
        <div className="text-center">
          <h1 className="text-5xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-6">
            Welcome to E-Shop
          </h1>
          <p className="text-xl text-gray-600 max-w-2xl mx-auto mb-8">
            Full-stack MERN E-Commerce app complete!
          </p>
          <Link to="/products" className="bg-blue-600 text-white px-8 py-4 rounded-full text-lg font-semibold hover:bg-blue-700">
            Shop Now →
          </Link>
        </div>
      </div>
    );

    const ProductCard = ({ product }) => {
      const { addToCart } = useContext(CartContext);
      return (
        <div className="bg-white rounded-2xl shadow-lg p-6 hover:shadow-2xl transition-all">
          <img src={product.image} alt={product.name} className="w-full h-48 object-cover rounded-xl mb-4" />
          <h3 className="text-xl font-bold mb-2">{product.name}</h3>
          <p className="text-2xl font-bold text-blue-600 mb-4">${product.price}</p>
          <div className="flex items-center mb-4">
            <div className="flex text-yellow-400 mb-1">
              {[...Array(5)].map((_, i) => <span key={i}>★</span>)}
            </div>
            <span className="ml-2 text-sm text-gray-500">({product.numReviews})</span>
          </div>
          <button 
            onClick={() => addToCart(product)}
            className="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 font-semibold transition-colors"
          >
            Add to Cart
          </button>
        </div>
      );
    };

    const Products = () => (
      <div className="max-w-4xl mx-auto py-12 px-4">
        <h1 className="text-3xl font-bold mb-8">Featured Products</h1>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
          {sampleProducts.map(product => (
            <ProductCard key={product._id} product={product} />
          ))}
        </div>
      </div>
    );

    const Cart = () => {
      const { cartItems, removeFromCart } = useContext(CartContext);
      const total = cartItems.reduce((a, c) => a + c.price * c.count, 0);
      
      if (!cartItems.length) return (
        <div className="max-w-4xl mx-auto py-12 px-4 text-center">
          <h2 className="text-3xl font-bold mb-4">Your cart is empty</h2>
          <Link to="/products" className="bg-blue-600 text-white px-8 py-4 rounded-xl font-semibold">
            Start Shopping
          </Link>
        </div>
      );

      return (
        <div className="max-w-4xl mx-auto py-12 px-4">
          <h1 className="text-3xl font-bold mb-8">Shopping Cart</h1>
          {cartItems.map(item => (
            <div key={item._id} className="flex bg-white rounded-xl p-6 mb-6 shadow-lg">
              <img src={item.image} alt={item.name} className="w-24 h-24 object-cover rounded-lg mr-6" />
              <div className="flex-1">
                <h3 className="text-xl font-bold mb-2">{item.name}</h3>
                <p className="text-2xl font-bold">${item.price}</p>
                <p className="text-gray-600">Qty: {item.count}</p>
              </div>
              <button onClick={() => removeFromCart(item._id)} className="ml-6 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                Remove
              </button>
            </div>
          ))}
          <div className="bg-white rounded-xl p-8 shadow-lg">
            <h2 className="text-2xl font-bold mb-4">Total: ${total.toFixed(2)}</h2>
            <button className="w-full bg-green-600 text-white py-4 rounded-xl text-lg font-bold hover:bg-green-700">
              Proceed to Checkout
            </button>
          </div>
        </div>
      );
    };

    const App = () => (
      <BrowserRouter>
        <CartProvider>
          <Navbar />
          <Routes>
            <Route path="/" element={<Home />} />
            <Route path="/products" element={<Products />} />
            <Route path="/cart" element={<Cart />} />
          </Routes>
        </CartProvider>
      </BrowserRouter>
    );

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
